<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>原神老婆图鉴与问卷</title>
    <style>
        /* ================= 全局样式 ================= */
        :root {
            --primary-color: #4facfe;
            --secondary-color: #00f2fe;
            --accent-color: #ff6b6b;
            --text-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
            line-height: 1.6;
        }

        /* ================= 通用卡片样式 ================= */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            margin: 20px auto 40px;
            max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            text-align: center;
            background: linear-gradient(135deg, var(--accent-color), #4ecdc4);
            color: white;
            padding: 15px;
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        /* ================= 老婆展示区 ================= */
        .waifu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .waifu-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .waifu-card:hover { transform: translateY(-5px); }
        
        .waifu-card .tier { 
            font-weight: bold; 
            font-size: 18px; 
            margin-bottom: 12px; 
            color: #e74c3c; 
            background: #fff0f0;
            border-radius: 20px;
            padding: 2px 0;
        }
        .waifu-card .info { color: #666; font-size: 14px; margin-top: 5px;}
        
        .waifu-card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            object-position: top center; /* 关键修复：长图优先截取上半部分(头部) */
            border-radius: 50%;
            border: 4px solid #f0f0f0;
            transition: all 0.3s;
            background: #fff;
        }
        .waifu-card img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            border-color: gold;
        }

        .slogan-text {
            text-align: center;
            font-size: 24px;
            color: gold;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            margin: 10px 0 20px;
            font-family: 'KaiTi', 'STXingkai', cursive;
            animation: shine 2.5s infinite alternate;
        }
        @keyframes shine {
            from { text-shadow: 0 0 5px gold, 2px 2px 4px rgba(0,0,0,0.8); }
            to { text-shadow: 0 0 20px gold, 0 0 30px #fff; }
        }

        /* ================= 表格样式 ================= */
        .table-container { overflow-x: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 16px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border: 1px solid #eee; }
        th { background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); color: white; font-weight: normal; font-size: 18px; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #fffacd !important; transition: 0.2s;}
        td img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; object-position: top center; }

        /* ================= 表单样式 ================= */
        .form-container { padding: 30px; }
        form { max-width: 500px; margin: 0 auto; }
        fieldset { border: 2px solid var(--primary-color); border-radius: 10px; padding: 20px; margin-bottom: 20px; background: rgba(255,255,255,0.5); }
        legend { background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-inline { display: flex; gap: 20px; margin-bottom: 15px; align-items: center; }
        input[type="text"], input[type="password"], select {
            width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: 0.3s; background: rgba(255,255,255,0.9);
        }
        input[type="text"]:focus, input[type="password"]:focus, select:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 8px rgba(255, 107, 107, 0.3); }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        input[type="submit"], input[type="reset"] { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; transition: 0.3s; }
        input[type="submit"] { background: linear-gradient(45deg, #e67e22, #d35400); }
        input[type="submit"]:hover { box-shadow: 0 5px 15px rgba(211, 84, 0, 0.4); transform: translateY(-2px); }
        input[type="reset"] { background: #95a5a6; }
        input[type="reset"]:hover { background: #7f8c8d; }

        /* ================= 连连看(Bingo)特效 ================= */
        .link-game-container { position: relative; padding: 30px 20px; background: #f8f9fa; }
        .link-table { width: 100%; max-width: 600px; border-collapse: separate; border-spacing: 15px; margin: 0 auto; position: relative; z-index: 2; }
        .link-cell {
            background: white; padding: 20px 10px; text-align: center; border-radius: 12px; font-size: 16px; font-weight: bold;
            color: #2c3e50; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.2s ease;
            user-select: none; border: 2px solid transparent; width: 33.33%; height: 80px;
        }
        .link-cell:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        
        /* 选中的状态 */
        .link-cell.selected { background: var(--primary-color); color: white; transform: scale(1.05); box-shadow: 0 0 15px rgba(79, 172, 254, 0.6); }
        
        /* 胜利连线的状态 */
        .link-cell.matched { background: #ff4757; color: white; border-color: #ff6b81; animation: pulse 0.5s ease-out; }

        #connection-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }
        
        .connection-line {
            stroke: #ff4757; stroke-width: 8; stroke-linecap: round; fill: none;
            filter: drop-shadow(0 0 8px rgba(255, 71, 87, 0.8));
            animation: drawLine 0.5s ease-out forwards;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes drawLine { from { stroke-dasharray: 1000; stroke-dashoffset: 1000; } to { stroke-dasharray: 1000; stroke-dashoffset: 0; } }

        .reset-btn { display: block; margin: 25px auto 0; padding: 10px 30px; background: #e74c3c; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 16px; transition: 0.3s; position: relative; z-index: 4;}
        .reset-btn:hover { background: #c0392b; transform: scale(1.05); }

        /* ================= 弹窗 ================= */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 5px solid gold; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 90%; }
        .modal h1 { font-size: 36px; color: #d35400; margin-bottom: 15px; }
        .modal p { font-size: 18px; color: #555; margin-bottom: 25px; }
        .modal button { padding: 12px 35px; font-size: 18px; font-weight: bold; background: var(--primary-color); color: white; border: none; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .modal button:hover { background: #00c6ff; transform: scale(1.05); }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <!-- 1. 老婆图片展示 -->
    <div class="card">
        <h2 class="card-header">老婆图鉴展示</h2>
        <div class="waifu-grid">
            <div class="waifu-card">
                <p class="tier">小妾</p>
                <img src="https://patchwiki.biligame.com/images/ys/0/05/8c9hbw8vgn7omiecnpu911rw8d4afe0.png" alt="刻晴">
                <p class="info">雷系 | 璃月</p>
            </div>
            <div class="waifu-card">
                <p class="tier">老婆</p>
                <!-- 替换了完美的优菈官方头像 -->
                <img src="OIP.webp" alt="优菈">
                <p class="info">冰系 | 蒙德</p>
            </div>
            <div class="waifu-card">
                <p class="tier">老婆</p>
                <img src="https://upload-bbs.mihoyo.com/upload/2022/01/28/273580340/14bf647809c650e6c889f7484550e6be_7850637775427186971.png" alt="宵宫">
                <p class="info">火系 | 稻妻</p>
            </div>
            <div class="waifu-card">
                <p class="tier">小妾</p>
                <img src="https://olimg.3dmgame.com/uploads/images/xiaz/2025/0513/1747114898155_jpg_r.jpg" alt="丝柯克">
                <p class="info">未知 | 未知</p>
            </div>
        </div>
        <div class="slogan-text">我永远是宵宫的狗</div>
        <div class="slogan-text">我永远是优菈的狗</div>
    </div>

    <!-- 2. 老婆分级表 -->
    <div class="card">
        <h2 class="card-header">老婆分级表</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>老婆级</th><th>小妾级</th><th>代表图片</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>宵宫</td><td>刻晴</td>
                        <td><img src="https://upload-bbs.miyoushe.com/upload/2021/08/29/280797608/a83cfcdca56977beee52f047e6e234a2_3868032400354341113.jpg" alt="宵宫"></td>
                    </tr>
                    <tr>
                        <td>优菈</td><td>丝柯克</td>
                        <td><img src="OIP.webp" alt="优菈"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 3. 原神问卷表单 -->
    <div class="card">
        <h2 class="card-header">原神问卷调查</h2>
        <div class="form-container">
            <form action="#" method="post">
                <fieldset>
                    <legend>原神牛博一</legend>
                    <p style="text-align:center; color:#666; margin-bottom:10px;">快来玩原神吧</p>
                    <div class="form-group"><input type="text" placeholder="请输入用户名" required></div>
                    <div class="form-inline">
                        <label>性别：</label>
                        <label><input type="radio" name="gender" value="male"> 男</label>
                        <label><input type="radio" name="gender" value="female"> 女</label>
                    </div>
                    <div class="form-inline">
                        <label>服务器：</label>
                        <label><input type="checkbox" name="server" value="b"> B服</label>
                        <label><input type="checkbox" name="server" value="official"> 官服</label>
                    </div>
                    <div class="form-group">
                        <select name="love">
                            <option value="1">我爱死原神了</option>
                            <option value="2">超喜欢</option>
                            <option value="3">还行</option>
                        </select>
                    </div>
                    <div class="form-group"><input type="password" name="pwd" placeholder="请输入UID" required></div>
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; color:#666;">上传你的练度截图：</label>
                        <input type="file" name="wj" accept="image/*">
                    </div>    
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; color:#666;">原神浓度 (1-100)：</label>
                        <input type="range" max="100" min="1" value="50" style="width: 100%;">
                    </div>
                    <div class="btn-group">
                        <input type="submit" value="确认提交">
                        <input type="reset" value="重新填写">
                    </div>
                </fieldset>
            </form>
        </div>
    </div>

    <!-- 4. 连连看 (宾果/三子棋玩法) -->
    <div class="card">
        <h2 class="card-header">纯纯的原神启动器</h2>
        <div class="link-game-container">
            <svg id="connection-svg"></svg>
            <table class="link-table">
                <tr>
                    <td class="link-cell">原 神 60 级</td>
                    <td class="link-cell">全地图96%以上探索度</td>
                    <td class="link-cell">基本天天都玩 原神</td>
                </tr>
                <tr>
                    <td class="link-cell">姓 李</td>
                    <td class="link-cell">名 文昊</td>
                    <td class="link-cell">uid 1 或 2 开头</td>
                </tr>
                <tr>
                    <td class="link-cell">还玩 崩铁</td>
                    <td class="link-cell">总 是 宅 在家</td>
                    <td class="link-cell">喊出去还在玩 原神</td>
                </tr>
            </table>
            <button class="reset-btn" onclick="resetGame()">重置表格</button>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <h1>这辈子有了！</h1>
            <p>线索已连成直线，鉴定为纯纯的原神启动器！</p>
            <button onclick="closeModal()">关闭</button>
        </div>
    </div>

    <!-- 连连看脚本 (直线/斜线判断) -->
    <script>
        const cells = Array.from(document.querySelectorAll('.link-cell'));
        const svg = document.getElementById('connection-svg');
        const modal = document.getElementById('successModal');
        let hasWon = false;

        // 定义所有可以赢的连线组合 (横排、竖排、对角线)
        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // 横向三条
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // 纵向三条
            [0, 4, 8], [2, 4, 6]             // 斜向两条
        ];

        cells.forEach((cell, index) => {
            cell.dataset.index = index; // 给每个格子标上序号
            
            cell.addEventListener('click', function() {
                if (hasWon) return; // 如果已经赢了，就不允许再点了

                // 点击切换选中/取消选中状态
                this.classList.toggle('selected');
                
                checkWinCondition();
            });
        });

        function checkWinCondition() {
            // 获取当前所有被选中的格子的序号
            const selectedIndexes = cells
                .filter(c => c.classList.contains('selected'))
                .map(c => parseInt(c.dataset.index));

            // 遍历所有胜利组合，看是否有被完全选中的
            for (let combo of winningCombinations) {
                // 如果当前选中的格子包含了某个胜利组合的全部3个格子
                if (combo.every(idx => selectedIndexes.includes(idx))) {
                    hasWon = true;
                    
                    // 将这3个格子变成红色高亮(matched)
                    combo.forEach(idx => {
                        cells[idx].classList.remove('selected');
                        cells[idx].classList.add('matched');
                    });

                    // 画一条直线穿过这三个格子
                    drawStraightLine(cells[combo[0]], cells[combo[2]]);

                    // 延迟0.6秒弹出窗口
                    setTimeout(() => { modal.style.display = 'flex'; }, 600);
                    break;
                }
            }
        }

        function drawStraightLine(startCell, endCell) {
            const containerRect = document.querySelector('.link-game-container').getBoundingClientRect();
            const rect1 = startCell.getBoundingClientRect();
            const rect2 = endCell.getBoundingClientRect();

            // 计算起点和终点的中心坐标
            const x1 = rect1.left + rect1.width / 2 - containerRect.left;
            const y1 = rect1.top + rect1.height / 2 - containerRect.top;
            const x2 = rect2.left + rect2.width / 2 - containerRect.left;
            const y2 = rect2.top + rect2.height / 2 - containerRect.top;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            // 画一条直直的线连过三个格子
            path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
            path.classList.add('connection-line');
            svg.appendChild(path);
        }

        function resetGame() {
            cells.forEach(cell => cell.classList.remove('selected', 'matched'));
            while (svg.firstChild) svg.removeChild(svg.firstChild);
            hasWon = false;
        }

        function closeModal() { 
            modal.style.display = 'none'; 
            resetGame(); 
        }
    </script>
</body>
</html>
